<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时会议转录转写</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .controls button { padding: 10px 20px; font-size: 16px; margin-right: 10px; cursor: pointer; }
        .status { margin-bottom: 20px; font-weight: bold; color: blue; }
        #transcription { 
            background: #f4f4f4; 
            padding: 15px; 
            border: 1px solid #ccc; 
            min-height: 300px; 
            max-height: 500px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            font-size: 16px;
        }
        .partial { color: #888; }
        .final { color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <h2>实时会议转录测试系统</h2>
    <div class="status" id="statusMessage">后端就绪中，请点击开始...</div>
    <div class="controls">
        <button id="startBtn">开始录音</button>
        <button id="stopBtn" disabled>停止录音</button>
    </div>
    <div style="margin-top:20px;">
        <p>实时转录结果：</p>
        <div id="transcription"></div>
    </div>

    <script>
        let ws;
        let audioContext;
        let mediaStream;
        let processor;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusMessage = document.getElementById('statusMessage');
        const transcriptionDiv = document.getElementById('transcription');

        let accumulatedText = "";
        let currentPartialText = "";

        // 将 float32 格式转换为 16位 PCM (FunASR所需流格式)
        // 之前的手写粗糙下采样算法会引入极大的毛刺底噪，严重影响模型识别，现在我们将重采样交由底层引擎处理
        function floatTo16BitPCM(input) {
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                const s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output;
        }

        function renderText() {
            let html = "";
            if (accumulatedText) {
                html += `<span class="final">${accumulatedText}</span>`;
            }
            if (currentPartialText) {
                html += `<br/><span class="partial">${currentPartialText}</span>`;
            }
            transcriptionDiv.innerHTML = html;
            transcriptionDiv.scrollTop = transcriptionDiv.scrollHeight;
        }

        async function startRecording() {
            try {
                // 核心修复1：开启高级环境降噪、回声抑制和自动增益！底噪过大会导致 VAD 无法识别断句，从而一直出不来黑字（is_final）
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    } 
                });
            } catch (err) {
                alert("获取麦克风失败：" + err);
                return;
            }

            statusMessage.innerText = "正在连接后端代理...";
            startBtn.disabled = true;
            stopBtn.disabled = false;

            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                statusMessage.innerText = "录音中，并已建立连接...";
                accumulatedText = "";
                currentPartialText = "";
                renderText();
                
                // 核心修复2：强制开启底层原生 16000Hz 音频环境，这是当前最高保真的录制格式
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(mediaStream);
                // 使用 4096 作为采样缓存区间，平衡延迟和开销
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    if (ws.readyState === WebSocket.OPEN) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        // 数据已经通过麦克风原生理转为了高保真 16kHz 我们只需做类型转换发送即可
                        const pcm16 = floatTo16BitPCM(inputData);
                        ws.send(pcm16.buffer);
                    }
                };
            };

            ws.onmessage = (event) => {
                try {
                    const res = JSON.parse(event.data);
                    // 【调试日志】如果依然有问题，请在浏览器 F12 Console 查看下面这行日志打印的 JSON 结构
                    console.log("[ASR Result]", res);

                    const text = res.text || "";
                    const isFinal = res.is_final;
                    const mode = res.mode;

                    // 兼容性判断：is_final 为 true 或者 mode 为 2pass-offline 都视为一句话结束
                    if (isFinal === true || isFinal === 1 || mode === "2pass-offline") {
                        if (text.strip && text.strip() || text) {
                            accumulatedText += (accumulatedText ? "\n" : "") + text.trim();
                            currentPartialText = "";
                            console.log("--- 触发结算 ---");
                        }
                    } else {
                        currentPartialText = text;
                    }
                    renderText();
                } catch(e) {
                    console.error("解析返回数据失败: ", e, event.data);
                }
            };

            ws.onerror = (e) => {
                console.error("WebSocket报错: ", e);
                statusMessage.innerText = "后端连接异常断开！";
                stopRecording();
            };

            ws.onclose = () => {
                statusMessage.innerText = "转录连接已关闭。";
                stopRecording();
            };
        }

        function stopRecording() {
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusMessage.innerText = "已停止采集";
            
            if (processor) {
                processor.disconnect();
                processor = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }
        }

        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
    </script>
</body>
</html>
